name: Nightly Supabase Backup

on:
  schedule:
    # Every day at 00:00 UTC (03:00 Turkey during summer)
    - cron: '0 0 * * *'

  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 Client
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl gnupg ca-certificates lsb-release

          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor --batch --yes -o /usr/share/keyrings/postgresql.gpg

          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list

          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

          echo "Installed pg_dump version:"
          pg_dump --version

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Restore rclone config
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONFIG }}
          EOF

      - name: Create Backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          mkdir -p backup

          pg_dump \
            -h "${{ secrets.SUPABASE_HOST }}" \
            -p "${{ secrets.SUPABASE_PORT }}" \
            -U "${{ secrets.SUPABASE_USER }}" \
            -d "${{ secrets.SUPABASE_DB }}" \
            -Fc \
            -f backup/database.backup

          zip -r "backup-$(date +%F).zip" backup

      - name: Upload Backup to Google Drive
        run: |
          rclone copy backup-*.zip "gdrive:supabase backups"

      - name: List Files in Google Drive Folder
        run: |
          rclone ls "gdrive:supabase backups"