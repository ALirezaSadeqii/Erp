name: Nightly Supabase Backup

on:
  schedule:
    # Runs every day at 03:00 Turkey time (00:00 UTC)
    - cron: '0 0 * * *'

  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 17 Client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl gnupg lsb-release zip

          sudo install -d /usr/share/postgresql-common/pgdg

          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            sudo gpg --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg

          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list

          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 zip

          pg_dump --version

      - name: Create Backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          mkdir -p backup

          pg_dump \
            -h "${{ secrets.SUPABASE_HOST }}" \
            -p "${{ secrets.SUPABASE_PORT }}" \
            -U "${{ secrets.SUPABASE_USER }}" \
            -d "${{ secrets.SUPABASE_DB }}" \
            -Fc \
            -f backup/database.backup

          zip -r "backup-$(date +%F).zip" backup

      - name: Upload to Google Drive
        uses: satackey/action-google-drive@v1
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          parent_folder_id: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          source: backup-*.zip