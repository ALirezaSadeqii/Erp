name: Nightly Supabase Backup

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client zip

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Restore rclone config
        run: |
          mkdir -p ~/.config/rclone
          cat <<EOF > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_CONFIG }}
          EOF

      - name: Create Backup
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
          mkdir -p backup

          pg_dump \
            -h "${{ secrets.SUPABASE_HOST }}" \
            -p "${{ secrets.SUPABASE_PORT }}" \
            -U "${{ secrets.SUPABASE_USER }}" \
            -d "${{ secrets.SUPABASE_DB }}" \
            -Fc \
            -f backup/database.backup

          zip -r "backup-$(date +%F).zip" backup

      - name: Upload to Google Drive
        run: |
          rclone copy backup-*.zip "gdrive:supabase backups"